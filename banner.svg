<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dcfff"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="280" rx="14" fill="url(#bg)"/>
  <rect width="900" height="280" rx="14" fill="none" stroke="#3b4261" stroke-width="1.5"/>

  <!-- Neural network, right side -->
  <g transform="translate(560,20)" filter="url(#glow)">
    <!-- connections -->
    <g stroke="#3b4261" stroke-width="1">
      <line x1="20" y1="40" x2="140" y2="20"><animate attributeName="stroke" values="#3b4261;#7dcfff;#3b4261" dur="3s" begin="0s" repeatCount="indefinite"/></line>
      <line x1="20" y1="40" x2="140" y2="80"><animate attributeName="stroke" values="#3b4261;#7dcfff;#3b4261" dur="3s" begin="0.3s" repeatCount="indefinite"/></line>
      <line x1="20" y1="110" x2="140" y2="20"><animate attributeName="stroke" values="#3b4261;#bb9af7;#3b4261" dur="3s" begin="0.6s" repeatCount="indefinite"/></line>
      <line x1="20" y1="110" x2="140" y2="80"><animate attributeName="stroke" values="#3b4261;#7dcfff;#3b4261" dur="3s" begin="0.9s" repeatCount="indefinite"/></line>
      <line x1="20" y1="110" x2="140" y2="150"><animate attributeName="stroke" values="#3b4261;#bb9af7;#3b4261" dur="3s" begin="1.2s" repeatCount="indefinite"/></line>
      <line x1="20" y1="180" x2="140" y2="80"><animate attributeName="stroke" values="#3b4261;#7dcfff;#3b4261" dur="3s" begin="1.5s" repeatCount="indefinite"/></line>
      <line x1="20" y1="180" x2="140" y2="150"><animate attributeName="stroke" values="#3b4261;#bb9af7;#3b4261" dur="3s" begin="1.8s" repeatCount="indefinite"/></line>

      <line x1="140" y1="20" x2="260" y2="60"><animate attributeName="stroke" values="#3b4261;#7dcfff;#3b4261" dur="3s" begin="0.2s" repeatCount="indefinite"/></line>
      <line x1="140" y1="80" x2="260" y2="60"><animate attributeName="stroke" values="#3b4261;#bb9af7;#3b4261" dur="3s" begin="0.5s" repeatCount="indefinite"/></line>
      <line x1="140" y1="80" x2="260" y2="140"><animate attributeName="stroke" values="#3b4261;#7dcfff;#3b4261" dur="3s" begin="0.8s" repeatCount="indefinite"/></line>
      <line x1="140" y1="150" x2="260" y2="140"><animate attributeName="stroke" values="#3b4261;#bb9af7;#3b4261" dur="3s" begin="1.1s" repeatCount="indefinite"/></line>
      <line x1="140" y1="150" x2="260" y2="60"><animate attributeName="stroke" values="#3b4261;#7dcfff;#3b4261" dur="3s" begin="1.4s" repeatCount="indefinite"/></line>
    </g>

    <!-- nodes layer 1 -->
    <circle cx="20" cy="40" r="6" fill="url(#nodeGlow)"><animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="20" cy="110" r="6" fill="url(#nodeGlow)"><animate attributeName="r" values="5;7;5" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="20" cy="180" r="6" fill="url(#nodeGlow)"><animate attributeName="r" values="5;7;5" dur="2.6s" repeatCount="indefinite"/></circle>

    <!-- nodes layer 2 -->
    <circle cx="140" cy="20" r="6" fill="url(#nodeGlow)"><animate attributeName="r" values="5;7;5" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="80" r="6" fill="url(#nodeGlow)"><animate attributeName="r" values="5;7;5" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="150" r="6" fill="url(#nodeGlow)"><animate attributeName="r" values="5;7;5" dur="2.4s" repeatCount="indefinite"/></circle>

    <!-- nodes layer 3 (output) -->
    <circle cx="260" cy="60" r="7" fill="#7dcfff"><animate attributeName="r" values="6;9;6" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="140" r="7" fill="#bb9af7"><animate attributeName="r" values="6;9;6" dur="1.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Terminal window, left side -->
  <g transform="translate(30,30)">
    <rect x="0" y="0" width="480" height="220" rx="10" fill="#1a1b27" stroke="#3b4261" stroke-width="1.2"/>
    <!-- title bar -->
    <rect x="0" y="0" width="480" height="30" rx="10" fill="#1f2335"/>
    <rect x="0" y="20" width="480" height="10" fill="#1f2335"/>
    <circle cx="18" cy="15" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="15" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="15" r="5" fill="#9ece6a"/>
    <text x="240" y="19" fill="#565f89" font-family="Menlo,Consolas,monospace" font-size="11" text-anchor="middle">sanya@portfolio: ~</text>

    <!-- typed lines -->
    <text x="18" y="58" font-family="Menlo,Consolas,monospace" font-size="15" fill="#9ece6a">$ whoami</text>

    <text x="18" y="86" font-family="Menlo,Consolas,monospace" font-size="15" fill="#c0caf5" opacity="0">
      Sayani Chakraborty
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.15;0.2;1" dur="8s" repeatCount="indefinite" fill="freeze"/>
    </text>

    <text x="18" y="114" font-family="Menlo,Consolas,monospace" font-size="15" fill="#9ece6a" opacity="0">
      $ cat role.txt
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.28;0.32;1" dur="8s" repeatCount="indefinite" fill="freeze"/>
    </text>

    <text x="18" y="142" font-family="Menlo,Consolas,monospace" font-size="15" fill="#c0caf5" opacity="0">
      AI Engineer | Applied ML &amp; DL
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.42;0.46;1" dur="8s" repeatCount="indefinite" fill="freeze"/>
    </text>

    <text x="18" y="170" font-family="Menlo,Consolas,monospace" font-size="15" fill="#9ece6a" opacity="0">
      $ python3 stack.py
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.56;0.6;1" dur="8s" repeatCount="indefinite" fill="freeze"/>
    </text>

    <text x="18" y="198" font-family="Menlo,Consolas,monospace" font-size="14" fill="#7aa2f7" opacity="0">
      Python &#183; PyTorch &#183; YOLOv8 &#183; DSA
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.7;0.74;1" dur="8s" repeatCount="indefinite" fill="freeze"/>
    </text>

    <!-- blinking cursor -->
    <rect x="330" y="188" width="9" height="15" fill="#9ece6a" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.7;0.72;0.85;0.87;1" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
